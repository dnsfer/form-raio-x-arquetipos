<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raio-X da Marca — Arquétipos · por Bianca Rodrigues</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js" defer></script>
  </head>
  <body>
    <!-- NETLIFY FORM — necessário para receber os dados. Não remova. -->
    <form
      name="raio-x-arquetipos"
      data-netlify="true"
      netlify-honeypot="bot-field"
      action="/"
      method="POST"
      style="display: none"
    >
      <input type="hidden" name="form-name" value="raio-x-arquetipos"/>
      <input type="text" name="bot-field"/>
      <input type="text" name="nome"/>
      <input type="text" name="marca"/>
      <input type="email" name="email_cliente"/>
      <input type="text" name="arquetipos" />
    </form>
    <div class="wrap" id="root"></div>

  </body>
</html>
